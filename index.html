            stopCurrentSegment() {
                // 清除更新间隔
                if (this.playbackCheckInterval) {
                    clearInterval(this.playbackCheckInterval);
                    this.playbackCheckInterval = null;
                }
                
                if (this.currentlyPlayingSegment >= 0) {
                    const index = this.currentlyPlayingSegment;
                    this.videoPlayer.pause();
                    
                    // 不隐藏指针，只更新按钮状态
                    this.updatePlayButton(index, false);
                    
                    this.currentlyPlayingSegment = -1;
                }
            }
            
            updatePlayButton(index, isPlaying) {
                const button = document.querySelector(`[data-index="${index}"] .btn-play`);
                if (button) {
                    button.innerHTML = isPlaying ? '⏸️ 暂停' : '▶️ 播放';
                }
            }

            updatePointerPosition(index, currentTime) {
                const segment = this.segments[index];
                if (!segment) return;
                
                const pointer = document.getElementById(`pointer-${index}`);
                if (!pointer) return;
                
                // 计算指针在音频段中的相对位置 (0-100%)
                const relativeTime = currentTime - segment.start;
                const totalDuration = segment.end - segment.start;
                const positionPercent = (relativeTime / totalDuration) * 100;
                
                // 限制指针位置在 0-100% 范围内
                pointer.style.left = Math.max(0, Math.min(100, positionPercent)) + '%';
            }

            async exportSegment(index) {
                const segment = this.segments[index];
                if (!segment) return;
                
                this.showProgress(`导出音频段 ${index + 1}`, 0);
                this.showStatus(`正在导出音频段 ${index + 1}...`, 'info');
                
                try {
                    const audioData = await this.extractSegmentAudio(segment);
                    
                    let blob;
                    let extension;
                    
                    if (this.exportFormat === 'wav') {
                        blob = this.audioBufferToWav(audioData);
                        extension = 'wav';
                    } else {
                        blob = await this.convertToFormat(audioData, this.exportFormat);
                        extension = this.exportFormat;
                    }
                    
                    this.downloadBlob(blob, `${segment.name}.${extension}`);
                    
                    this.hideProgress();
                    this.showStatus(`音频段 "${segment.name}" 导出成功！`, 'success');
                } catch (error) {
                    console.error('导出失败:', error);
                    this.showStatus('导出失败: ' + error.message, 'error');
                }
            }

            async exportAllSegments() {
                if (this.segments.length === 0) {
                    this.showStatus('没有可导出的音频段', 'error');
                    return;
                }
                
                this.showStatus(`开始导出 ${this.segments.length} 个音频段...`, 'info');
                
                for (let i = 0; i < this.segments.length; i++) {
                    this.showProgress('导出音频', ((i + 1) / this.segments.length) * 100);
                    await this.exportSegment(i);
                    
                    await new Promise(resolve => setTimeout(resolve, 500));
                }
                
                this.showStatus(`全部 ${this.segments.length} 个音频段导出完成！`, 'success');
            }

            async extractSegmentAudio(segment) {
                if (!this.audioBuffer) {
                    throw new Error('音频数据不可用');
                }
                
                const startTime = Math.floor(segment.start * this.audioBuffer.sampleRate);
                const endTime = Math.floor(segment.end * this.audioBuffer.sampleRate);
                const length = endTime - startTime;
                
                const audioData = {
                    length: length,
                    numberOfChannels: this.audioBuffer.numberOfChannels,
                    sampleRate: this.audioBuffer.sampleRate,
                    getChannelData: (channel) => {
                        return this.audioBuffer.getChannelData(channel).slice(startTime, endTime);
                    }
                };
                
                return audioData;
            }

            audioBufferToWav(audioBuffer) {
                const numChannels = audioBuffer.numberOfChannels || 1;
                const sampleRate = audioBuffer.sampleRate;
                const format = 1;
                const bitDepth = 16;
                
                const bytesPerSample = bitDepth / 8;
                const blockAlign = numChannels * bytesPerSample;
                
                const dataLength = audioBuffer.length * numChannels * bytesPerSample;
                const headerLength = 44;
                const totalLength = headerLength + dataLength;
                
                const buffer = new ArrayBuffer(totalLength);
                const view = new DataView(buffer);
                
                const writeString = (offset, string) => {
                    for (let i = 0; i < string.length; i++) {
                        view.setUint8(offset + i, string.charCodeAt(i));
                    }
                };
                
                writeString(0, 'RIFF');
                view.setUint32(4, totalLength - 8, true);
                writeString(8, 'WAVE');
                writeString(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, format, true);
                view.setUint16(22, numChannels, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * blockAlign, true);
                view.setUint16(32, blockAlign, true);
                view.setUint16(34, bitDepth, true);
                writeString(36, 'data');
                view.setUint32(40, dataLength, true);
                
                const channels = [];
                for (let i = 0; i < numChannels; i++) {
                    channels.push(audioBuffer.getChannelData(i));
                }
                
                let offset = 44;
                for (let i = 0; i < audioBuffer.length; i++) {
                    for (let channel = 0; channel < numChannels; channel++) {
                        const sample = Math.max(-1, Math.min(1, channels[channel][i]));
                        const intValue = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                        view.setInt16(offset, intValue, true);
                        offset += 2;
                    }
                }
                
                return new Blob([buffer], { type: 'audio/wav' });
            }

            async convertToFormat(audioData, format) {
                this.showStatus(`正在转换为 ${format.toUpperCase()} 格式...`, 'info');
                
                if (format === 'wav') {
                    return this.audioBufferToWav(audioData);
                } else {
                    return this.audioBufferToWav(audioData);
                }
            }

            downloadBlob(blob, filename) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            showProgress(text, percent) {
                this.progressBar.classList.add('active');
                this.progressText.textContent = text;
                this.progressFill.style.width = percent + '%';
            }

            hideProgress() {
                this.progressBar.classList.remove('active');
            }

            showStatus(message, type) {
                this.statusMessage.textContent = message;
                this.statusMessage.className = 'status-message active ' + type;
                
                if (type !== 'info') {
                    setTimeout(() => {
                        this.statusMessage.classList.remove('active');
                    }, 5000);
                }
            }

            formatTime(seconds) {
                if (typeof seconds !== 'number' || isNaN(seconds)) return '00:00';
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }

            parseTime(timeStr) {
                const parts = timeStr.split(':');
                if (parts.length === 2) {
                    const mins = parseInt(parts[0]) || 0;
                    const secs = parseInt(parts[1]) || 0;
                    return mins * 60 + secs;
                }
                return NaN;
            }

            formatFileSize(bytes) {
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
                if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
                return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
            }
        }

        const extractor = new VideoAudioExtractor();
    </script>
